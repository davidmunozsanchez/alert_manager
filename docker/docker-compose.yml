version: "3.9"

services:
  # 🔥 SEQ - Plataforma centralizada de logs (PRIMERO)
  seq:
    image: datalust/seq:2024.3
    container_name: seq_logs
    ports:
      - "5341:80"  # 🌟 Interfaz web principal
    environment:
      ACCEPT_EULA: "Y"
      SEQ_FIRSTRUN_ADMINPASSWORDHASH: "${SEQ_ADMIN_PASSWORD_HASH:-}"
    volumes:
      - seq-data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:80/ || exit 1"]
      interval: 30s
      timeout: 15s
      retries: 5
      start_period: 90s

  # Base de datos principal para alertas
  db:
    image: postgres:15
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-alerts}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # API Web Service
  web:
    image: ghcr.io/${{ github.repository_owner }}/alert_manager:latest
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: alert_manager_web
    depends_on:
      db:
        condition: service_healthy
      seq:
        condition: service_started
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-alerts}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-alerts}
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      PYTHONPATH: /app/src
      LOG_LEVEL: ${LOG_LEVEL:-info}
      DISABLE_AUTH: ${DISABLE_AUTH:-false}
      SEQ_URL: http://seq:80  # 🎯 CLAVE: Usar puerto 80 interno de Seq
      ENVIRONMENT: ${ENVIRONMENT:-development}
    volumes:
      - ../src:/app/src:cached
      - ../tests:/app/tests:cached
      - ../logs:/app/logs
    working_dir: /app
    command: >
      sh -c "
        echo '🔥 Starting Alert Manager with Seq logging...' &&
        echo 'SEQ_URL configurado: $SEQ_URL' &&
        echo 'Waiting for database...' &&
        python src/app/wait_db.py &&
        echo 'Waiting for Seq...' &&
        sleep 30 &&
        echo 'Testing Seq connectivity on internal port...' &&
        curl -f http://seq:80/ -w 'Seq HTTP Status: %{http_code}\\n' || echo 'Seq not responding on port 80' &&
        curl -X POST http://seq:80/api/events/raw \
          -H 'Content-Type: application/vnd.serilog.clef' \
          -d '{\"@t\":\"'$$(date -u +%Y-%m-%dT%H:%M:%S.000Z)'\",\"@l\":\"Information\",\"@mt\":\"🚀 API starting up - Seq connectivity test\",\"Component\":\"api-startup\"}' \
          -w 'Seq API Test HTTP Status: %{http_code}\\n' || echo 'Failed to send test log to Seq API' &&
        echo 'Starting API server...' &&
        uvicorn src.app.main:app --host 0.0.0.0 --port 8000 --reload
      "
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s

  # Base de datos de Airflow
  airflow-db:
    image: postgres:15
    environment:
      POSTGRES_USER: ${AIRFLOW_DB_USER:-airflow}
      POSTGRES_PASSWORD: ${AIRFLOW_DB_PASSWORD:-airflow}
      POSTGRES_DB: ${AIRFLOW_DB_NAME:-airflow}
    volumes:
      - airflow_pgdata:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${AIRFLOW_DB_USER:-airflow}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Inicialización de Airflow
  airflow-init:
    image: apache/airflow:2.9.1
    depends_on:
      airflow-db:
        condition: service_healthy
    environment:
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${AIRFLOW_DB_USER:-airflow}:${AIRFLOW_DB_PASSWORD:-airflow}@airflow-db:5432/${AIRFLOW_DB_NAME:-airflow}
      AIRFLOW__CORE__EXECUTOR: SequentialExecutor
      AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
      AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW_FERNET_KEY:-}
      AIRFLOW_ADMIN_USER: ${AIRFLOW_ADMIN_USER:-admin}
      AIRFLOW_ADMIN_PASSWORD: ${AIRFLOW_ADMIN_PASSWORD:-admin}
      AIRFLOW_ADMIN_EMAIL: ${AIRFLOW_ADMIN_EMAIL:-admin@example.com}
      PYTHONPATH: /opt/airflow/infrastructure
    user: "0:0"
    volumes:
      - ../src/dags:/opt/airflow/dags
      - ./logs:/opt/airflow/logs
      - ../src/infrastructure/aemet_ingest.py:/opt/airflow/infrastructure/aemet_ingest.py:ro
      
    entrypoint: /bin/bash
    command:
      - -c
      - |
        airflow db migrate
        airflow users create \
          --username $${AIRFLOW_ADMIN_USER} \
          --password $${AIRFLOW_ADMIN_PASSWORD} \
          --firstname Admin \
          --lastname User \
          --role Admin \
          --email $${AIRFLOW_ADMIN_EMAIL} || true
        echo "Airflow init completed"

  # Servidor web de Airflow
  airflow-webserver:
    image: apache/airflow:2.9.1
    depends_on:
      airflow-init:
        condition: service_completed_successfully
      airflow-db:
        condition: service_healthy
    environment:
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${AIRFLOW_DB_USER:-airflow}:${AIRFLOW_DB_PASSWORD:-airflow}@airflow-db:5432/${AIRFLOW_DB_NAME:-airflow}
      AIRFLOW__CORE__EXECUTOR: SequentialExecutor
      AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
      AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW_FERNET_KEY:-}
      AIRFLOW__WEBSERVER__SECRET_KEY: ${AIRFLOW_WEBSERVER_SECRET_KEY:-mysecret}
      AIRFLOW__WEBSERVER__WORKERS: '1'
      AIRFLOW__WEBSERVER__WORKER_REFRESH_INTERVAL: '0'
      PYTHONPATH: /opt/airflow/infrastructure
    volumes:
      - ../src/dags:/opt/airflow/dags
      - ./logs:/opt/airflow/logs
      - ../src/infrastructure/aemet_ingest.py:/opt/airflow/infrastructure/aemet_ingest.py:ro
    ports:
      - "8080:8080"
    command: webserver
    restart: on-failure
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 2G

  # Scheduler de Airflow
  airflow-scheduler:
    image: apache/airflow:2.9.1
    depends_on:
      airflow-init:
        condition: service_completed_successfully
      airflow-db:
        condition: service_healthy
    environment:
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${AIRFLOW_DB_USER:-airflow}:${AIRFLOW_DB_PASSWORD:-airflow}@airflow-db:5432/${AIRFLOW_DB_NAME:-airflow}
      AIRFLOW__CORE__EXECUTOR: SequentialExecutor
      AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
      AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW_FERNET_KEY:-}
      PYTHONPATH: /opt/airflow/infrastructure
    volumes:
      - ../src/dags:/opt/airflow/dags
      - ./logs:/opt/airflow/logs
      - ../src/infrastructure/aemet_ingest.py:/opt/airflow/infrastructure/aemet_ingest.py:ro
    command: scheduler
    restart: on-failure

  # 🔍 Log Tester - Para verificar Seq correctamente
  log-tester:
    image: curlimages/curl:latest
    container_name: log_tester
    depends_on:
      seq:
        condition: service_started
    command: >
      sh -c "
        echo 'Esperando a que Seq esté listo...' &&
        sleep 60 &&
        echo 'Probando Seq en puerto interno 80...' &&
        curl -f http://seq:80/ -w 'Seq Web HTTP Status: %{http_code}\\n' || echo 'Seq web no responde' &&
        echo 'Enviando logs de prueba a Seq API...' &&
        while true; do
          TIMESTAMP=$$(date -u +%Y-%m-%dT%H:%M:%S.000Z) &&
          curl -X POST http://seq:80/api/events/raw \
            -H 'Content-Type: application/vnd.serilog.clef' \
            -d '{\"@t\":\"'$$TIMESTAMP'\",\"@l\":\"Information\",\"@mt\":\"🔥 Test log from container - Seq is working!\",\"Component\":\"log-tester\",\"Status\":\"healthy\",\"TestId\":\"'$$(date +%s)'\"}' \
            -w 'HTTP Status: %{http_code}\\n' || echo 'Failed to send test log' &&
          sleep 30
        done
      "
    restart: unless-stopped

  # 📊 Dozzle - Para logs de contenedores Docker (complementario)
  dozzle:
    container_name: dozzle
    image: amir20/dozzle:latest
    volumes:
      - //var/run/docker.sock:/var/run/docker.sock:ro
    ports:
      - "8888:8080"
    environment:
      DOZZLE_LEVEL: info
      DOZZLE_TAILSIZE: "300"
      DOZZLE_FILTER: "status=running"
    restart: unless-stopped

  # 📁 File Browser - Para navegar archivos de logs (backup)
  filebrowser:
    image: filebrowser/filebrowser:latest
    container_name: log_filebrowser
    ports:
      - "8081:80"
    volumes:
      - ../logs:/srv/logs:ro
      - ./logs:/srv/airflow-logs:ro
    environment:
      FB_BASEURL: "/logs"
    restart: unless-stopped

volumes:
  pgdata:
  airflow_pgdata:
  seq-data: