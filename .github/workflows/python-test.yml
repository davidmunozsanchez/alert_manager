name: Docker Integration Tests

on:
  push:
    branches: [ "main", "hito5" ]
  pull_request:
    branches: [ "main", "hito5" ]

jobs:
  lint:
    name: Lint and code quality
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Poetry
        uses: snok/install-poetry@v1

      - name: Install dependencies (incluyendo tests)
        run: poetry install

      - name: Check import sorting with isort
        run: |
          echo "Checking import order..."
          poetry run isort --check-only --diff src/ tests/
        continue-on-error: true

      - name: Lint with flake8
        run: |
          echo "Running flake8..."
          poetry run flake8 src/ tests/ --count --select=E9,F63,F7,F82 --show-source --statistics
          poetry run flake8 src/ tests/ --count --max-complexity=10 --max-line-length=127 --statistics
        continue-on-error: true

      - name: Security check with bandit
        run: |
          echo "Running security checks..."
          poetry run bandit -r src/ -ll
        continue-on-error: true

      - name: Type checking with mypy
        run: |
          echo "Running type checks..."
          poetry run mypy src/ --ignore-missing-imports
        continue-on-error: true

      - name: Lint with pylint
        run: |
          echo "Running pylint..."
          poetry run pylint src/ --disable=C0111,C0103,R0903 --max-line-length=127
        continue-on-error: true

  # Nuevos tests unitarios (no necesitan Docker)
  unit_tests:
    name: Unit tests (API, logging, middleware, pydantic)
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Poetry
        uses: snok/install-poetry@v1

      - name: Install dependencies
        run: poetry install

      - name: Run unit tests
        env:
          # Evitar tests que dependan de servicios externos aquí
          SKIP_AIRFLOW_TEST: "1"
        run: |
          poetry run pytest -v \
            tests/test_endpoints.py \
            tests/test_logging.py \
            tests/test_middleware.py \
            tests/test_pydantic.py

  # Tests de secrets (verifica que los secrets de GitHub estén configurados)
  test_secrets:
    name: Secrets configuration tests
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Poetry
        uses: snok/install-poetry@v1

      - name: Install dependencies
        run: poetry install

      - name: Run secrets tests
        env:
          # Secrets requeridos
          AEMET_API_KEY: ${{ secrets.AEMET_API_KEY }}
          # Secrets de PostgreSQL
          POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          POSTGRES_DB: ${{ secrets.POSTGRES_DB }}
          # Secrets de Airflow DB
          AIRFLOW_DB_USER: ${{ secrets.AIRFLOW_DB_USER }}
          AIRFLOW_DB_PASSWORD: ${{ secrets.AIRFLOW_DB_PASSWORD }}
          AIRFLOW_DB_NAME: ${{ secrets.AIRFLOW_DB_NAME }}
          # Secrets de Airflow
          AIRFLOW_FERNET_KEY: ${{ secrets.AIRFLOW_FERNET_KEY }}
          AIRFLOW_ADMIN_USER: ${{ secrets.AIRFLOW_ADMIN_USER }}
          AIRFLOW_ADMIN_PASSWORD: ${{ secrets.AIRFLOW_ADMIN_PASSWORD }}
          AIRFLOW_ADMIN_EMAIL: ${{ secrets.AIRFLOW_ADMIN_EMAIL }}
          AIRFLOW_WEBSERVER_SECRET_KEY: ${{ secrets.AIRFLOW_WEBSERVER_SECRET_KEY }}
          # Secrets opcionales
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SEQ_ADMIN_PASSWORD_HASH: ${{ secrets.SEQ_ADMIN_PASSWORD_HASH }}
          LOG_LEVEL: ${{ secrets.LOG_LEVEL }}
          DISABLE_AUTH: ${{ secrets.DISABLE_AUTH }}
          ENVIRONMENT: ${{ secrets.ENVIRONMENT }}
        run: |
          poetry run pytest -v tests/test_secrets.py

  # Tests de integración con Docker (incluye los nuevos tests añadidos en test_container.py)
  test_docker_integration:
    name: Docker integration tests (containers)
    runs-on: ubuntu-latest
    needs: lint
    env:
      CI: "1"                 # activa esperas extendidas en tests
      SKIP_AIRFLOW_TEST: "1"  # evita probar UI de Airflow aquí para mayor estabilidad
      # Secrets de la aplicación
      AEMET_API_KEY: ${{ secrets.AEMET_API_KEY }}
      POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
      POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
      POSTGRES_DB: ${{ secrets.POSTGRES_DB }}
      AIRFLOW_DB_USER: ${{ secrets.AIRFLOW_DB_USER }}
      AIRFLOW_DB_PASSWORD: ${{ secrets.AIRFLOW_DB_PASSWORD }}
      AIRFLOW_DB_NAME: ${{ secrets.AIRFLOW_DB_NAME }}
      AIRFLOW_FERNET_KEY: ${{ secrets.AIRFLOW_FERNET_KEY }}
      AIRFLOW_ADMIN_USER: ${{ secrets.AIRFLOW_ADMIN_USER }}
      AIRFLOW_ADMIN_PASSWORD: ${{ secrets.AIRFLOW_ADMIN_PASSWORD }}
      AIRFLOW_ADMIN_EMAIL: ${{ secrets.AIRFLOW_ADMIN_EMAIL }}
      AIRFLOW_WEBSERVER_SECRET_KEY: ${{ secrets.AIRFLOW_WEBSERVER_SECRET_KEY }}
      LOG_LEVEL: ${{ secrets.LOG_LEVEL }}
      DISABLE_AUTH: ${{ secrets.DISABLE_AUTH }}
      ENVIRONMENT: ${{ secrets.ENVIRONMENT }}
    steps:
      - name: Checkout del Código
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Poetry
        uses: snok/install-poetry@v1

      - name: Install dependencies (incluyendo tests)
        run: poetry install

      - name: Mostrar versión de Docker/Compose (debug)
        run: |
          docker --version
          docker compose version

      - name: Run integration tests (containers)
        run: poetry run pytest -v tests/test_container.py -s

      - name: Show Docker logs on failure
        if: failure()
        run: |
          echo "--- Docker PS Status ---"
          docker ps -a
          echo "--- Docker Compose PS ---"
          docker compose -f docker/docker-compose.yml ps
          echo "--- Docker Compose Logs ---"
          docker compose -f docker/docker-compose.yml logs --no-color --timestamps

      - name: Cleanup Docker
        if: always()
        run: docker compose -f docker/docker-compose.yml down -v --remove-orphans

  # Tests de DAGs (sin levantar toda la pila de Docker)
  test_dags:
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - name: Checkout del Código
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Poetry
        uses: snok/install-poetry@v1

      - name: Install dependencies (incluyendo tests)
        run: poetry install

      - name: Run DAG Tests
        env:
          # Aemet
          AEMET_API_KEY: ${{ secrets.AEMET_API_KEY }}
          # Postgres
          POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          POSTGRES_DB: ${{ secrets.POSTGRES_DB }}
          # Airflow
          AIRFLOW_DB_USER: ${{ secrets.AIRFLOW_DB_USER }}
          AIRFLOW_DB_PASSWORD: ${{ secrets.AIRFLOW_DB_PASSWORD }}
          AIRFLOW_DB_NAME: ${{ secrets.AIRFLOW_DB_NAME }}
          AIRFLOW_FERNET_KEY: ${{ secrets.AIRFLOW_FERNET_KEY }}
          AIRFLOW_ADMIN_USER: ${{ secrets.AIRFLOW_ADMIN_USER }}
          AIRFLOW_ADMIN_PASSWORD: ${{ secrets.AIRFLOW_ADMIN_PASSWORD }}
          AIRFLOW_ADMIN_EMAIL: ${{ secrets.AIRFLOW_ADMIN_EMAIL }}
          AIRFLOW_WEBSERVER_SECRET_KEY: ${{ secrets.AIRFLOW_WEBSERVER_SECRET_KEY }}
        run: poetry run pytest -v tests/test_dags.py

  # Tests CRUD existentes (se mantienen)
  test_crud:
    name: CRUD Unit Tests
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Poetry
        uses: snok/install-poetry@v1

      - name: Install dependencies
        run: poetry install

      - name: Run CRUD Unit Tests
        run: poetry run pytest -v tests/test_crud.py

  # Tests de integración AEMET críticos (requiere API real)
  test_aemet_integration:
    name: AEMET API Integration Tests
    runs-on: ubuntu-latest
    needs: lint
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Poetry
        uses: snok/install-poetry@v1

      - name: Install dependencies
        run: poetry install

      - name: Run AEMET Integration Tests
        env:
          AEMET_API_KEY: ${{ secrets.AEMET_API_KEY }}
        run: |
          poetry run pytest -v tests/test_aemet_integration.py -s
        continue-on-error: true
        # Se ejecuta pero no falla el workflow si falla (por si AEMET está down)

      - name: AEMET Tests Summary
        if: always()
        run: |
          echo "✅ Test de integración AEMET completado"
          echo "ℹ️  Este test verifica conectividad con la API real de AEMET"