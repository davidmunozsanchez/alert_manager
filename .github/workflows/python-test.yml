name: Docker Integration Tests

on:
  push:
    branches: [ "main", "hito2" ]
  pull_request:
    branches: [ "main", "hito2" ]

jobs:
  lint:
    name: Lint and code quality
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Poetry
        uses: snok/install-poetry@v1

      - name: Install dependencies (incluyendo tests)
        run: poetry install

      - name: Check import sorting with isort
        run: |
          echo "Checking import order..."
          poetry run isort --check-only --diff src/ tests/
        continue-on-error: true

      - name: Lint with flake8
        run: |
          echo "Running flake8..."
          poetry run flake8 src/ tests/ --count --select=E9,F63,F7,F82 --show-source --statistics
          poetry run flake8 src/ tests/ --count --max-complexity=10 --max-line-length=127 --statistics
        continue-on-error: true

      - name: Security check with bandit
        run: |
          echo "Running security checks..."
          poetry run bandit -r src/ -ll
        continue-on-error: true

      - name: Type checking with mypy
        run: |
          echo "Running type checks..."
          poetry run mypy src/ --ignore-missing-imports
        continue-on-error: true

      - name: Lint with pylint
        run: |
          echo "Running pylint..."
          poetry run pylint src/ --disable=C0111,C0103,R0903 --max-line-length=127
        continue-on-error: true

      # - name: Check code formatting with Black
      #   run: |
      #     echo "Checking code formatting..."
      #     black --check --diff src/ tests/
      #   continue-on-error: false

  test_docker_integration:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout del Código
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Poetry
        uses: snok/install-poetry@v1

      - name: Install dependencies (incluyendo tests)
        run: poetry install

      - name: Mostrar versión de Docker/Compose (debug)
        run: |
          docker --version
          docker compose version

      - name: Run Integration Tests (pytest-docker gestiona docker compose)
        run: poetry run pytest -v tests/test_container.py

      - name: Show Docker logs on failure
        if: failure()
        run: |
          echo "--- Docker PS Status ---"
          docker ps -a
          echo "--- Docker Compose PS ---"
          docker compose -f docker/docker-compose.yml ps
          echo "--- Docker Compose Logs ---"
          docker compose -f docker/docker-compose.yml logs --no-color --timestamps

      - name: Cleanup Docker
        if: always()
        run: docker compose -f docker/docker-compose.yml down -v --remove-orphans

  test_dags:
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - name: Checkout del Código
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Poetry
        uses: snok/install-poetry@v1

      - name: Install dependencies (incluyendo tests)
        run: poetry install

      - name: Run DAG Tests
        run: poetry run pytest -v tests/test_dags.py
