name: Docker Integration Tests

on:
  push:
    branches: [ "main", "hito2" ]
  pull_request:
    branches: [ "main", "hito2" ]

jobs:
  lint:
    name: Lint and code quality
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Poetry
        uses: snok/install-poetry@v1

      - name: Install dependencies (incluyendo tests)
        run: poetry install

      - name: Check import sorting with isort
        run: |
          echo "Checking import order..."
          poetry run isort --check-only --diff src/ tests/
        continue-on-error: true

      - name: Lint with flake8
        run: |
          echo "Running flake8..."
          poetry run flake8 src/ tests/ --count --select=E9,F63,F7,F82 --show-source --statistics
          poetry run flake8 src/ tests/ --count --max-complexity=10 --max-line-length=127 --statistics
        continue-on-error: true

      - name: Security check with bandit
        run: |
          echo "Running security checks..."
          poetry run bandit -r src/ -ll
        continue-on-error: true

      - name: Type checking with mypy
        run: |
          echo "Running type checks..."
          poetry run mypy src/ --ignore-missing-imports
        continue-on-error: true

      - name: Lint with pylint
        run: |
          echo "Running pylint..."
          poetry run pylint src/ --disable=C0111,C0103,R0903 --max-line-length=127
        continue-on-error: true

      # - name: Check code formatting with Black
      #   run: |
      #     echo "Checking code formatting..."
      #     black --check --diff src/ tests/
      #   continue-on-error: false

  test_docker_integration:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout del Código
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Poetry
        uses: snok/install-poetry@v1

      - name: Install dependencies (incluyendo tests)
        run: poetry install

      - name: Mostrar versión de Docker/Compose (debug)
        run: |
          docker --version
          docker compose version

      - name: Run Integration Tests (pytest-docker gestiona docker compose)
        run: poetry run pytest -v tests/test_container.py

      - name: Show Docker logs on failure
        if: failure()
        run: |
          echo "--- Docker PS Status ---"
          docker ps -a
          echo "--- Docker Compose PS ---"
          docker compose -f docker/docker-compose.yml ps
          echo "--- Docker Compose Logs ---"
          docker compose -f docker/docker-compose.yml logs --no-color --timestamps

      - name: Cleanup Docker
        if: always()
        run: docker compose -f docker/docker-compose.yml down -v --remove-orphans

  test_dags:
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - name: Checkout del Código
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Poetry
        uses: snok/install-poetry@v1

      - name: Install dependencies (incluyendo tests)
        run: poetry install

      - name: Run DAG Tests
        run: poetry run pytest -v tests/test_dags.py

  test_summary:
      name: Test summary & coverage
      runs-on: ubuntu-latest
      needs: [lint, test_docker_integration, test_dags]
      # if: always()  # Se ejecuta incluso si algún test falla

      steps:
        - name: Checkout code
          uses: actions/checkout@v4

        - name: Set up Python
          uses: actions/setup-python@v5
          with:
            python-version: '3.11'

        - name: Install Poetry
          uses: snok/install-poetry@v1

        - name: Install dependencies
          run: poetry install

        - name: Run all tests with coverage
          run: |
            poetry run pytest -v \
              --cov=src \
              --cov-report=term-missing \
              --cov-report=html \
              --cov-report=xml \
              tests/

        - name: Upload coverage to Codecov
          uses: codecov/codecov-action@v4
          with:
            file: ./coverage.xml
            flags: unittests
            name: codecov-umbrella
          continue-on-error: true

        - name: Coverage comment (PR only)
          if: github.event_name == 'pull_request'
          uses: py-cov-action/python-coverage-comment-action@v3
          with:
            GITHUB_TOKEN: ${{ github.token }}
          continue-on-error: true

        - name: Upload HTML coverage report as artifact
          uses: actions/upload-artifact@v4
          with:
            name: coverage-report
            path: htmlcov/

        - name: Test Summary
          run: |
            echo "## 📊 Test Execution Summary" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
            echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
            echo "| Lint | ${{ needs.lint.result }} |" >> $GITHUB_STEP_SUMMARY
            echo "| Docker Integration | ${{ needs.test_docker_integration.result }} |" >> $GITHUB_STEP_SUMMARY
            echo "| DAG Tests | ${{ needs.test_dags.result }} |" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### Coverage Report" >> $GITHUB_STEP_SUMMARY
            poetry run coverage report --format=markdown >> $GITHUB_STEP_SUMMARY || echo "No coverage data" >> $GITHUB_STEP_SUMMARY
