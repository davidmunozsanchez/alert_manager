name: Docker Integration Tests

on:
  push:
    branches: [ "main", "hito2" ]
  pull_request:
    branches: [ "main", "hito2" ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout del Código
        uses: actions/checkout@v3

      - name: Instalar Docker Compose
        # Esta action garantiza que Docker y Docker Compose están instalados y listos.
        uses: docker/setup-compose-action@v1

      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install Poetry
        uses: snok/install-poetry@v1

      - name: Install dependencies (incluyendo tests)
        # Asegúrate de que pytest, requests, sqlalchemy, y psycopg2-binary estén en tus dependencias
        run: poetry install

      - name: Levantar Contenedores con Docker Compose
        # Usamos -f para especificar la ruta al docker-compose.yml
        # Usamos -d para ejecutar en segundo plano (detached)
        # Usamos --build para reconstruir la imagen 'web' si es necesario
        run: docker compose -f docker/docker-compose.yml up -d --build
        
      - name: Run Integration Tests
        # Los tests (como test_integration.py) ahora pueden usar 'localhost' para esperar y probar los servicios.
        run: |
          poetry run pytest -v tests/test_integration.py
          
      - name: Show Docker logs
        if: always()
        run: |
          echo "--- Docker PS Status ---"
          docker ps
          echo "--- Docker Compose Logs ---"
          # Mostrar logs detallados si algo falló
          docker-compose -f docker/docker-compose.yml logs
          
      - name: Cleanup Docker
        if: always()
        # Detiene y elimina contenedores, redes y volúmenes (-v)
        run: |
          docker-compose -f docker/docker-compose.yml down -v