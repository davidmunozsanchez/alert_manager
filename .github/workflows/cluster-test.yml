name: Cluster Test

on:
  workflow_dispatch:
  push:
    branches: ["main", "hito5"]
  pull_request:
    branches: ["main", "hito5"]

jobs:
  test-cluster:
    runs-on: ubuntu-latest
    # 👇 Permisos necesarios para leer el token
    permissions:
      contents: read
      packages: read

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      # 👇 ESTE ES EL PASO QUE FALTABA (Login)
      # Sin esto, Docker intenta entrar como "anónimo" y falla
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Create .env from template if exists
        run: |
          if [ -f .env.example ]; then cp .env.example .env; fi

      # Ahora el debug sí funcionará porque estás logueado
      - name: Debug - Force Pull Image
        run: |
          echo "Intentando descargar explícitamente..."
          docker pull ghcr.io/davidmunozsanchez/alert_manager:latest
          echo "✅ Imagen descargada correctamente"
          docker images

      - name: Start cluster
        env:
          AEMET_API_KEY: ${{ secrets.AEMET_API_KEY }}
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          DB_NAME: alert_manager
        run: |
          # --no-build fuerza a usar la imagen descargada
          cd docker && docker compose -f docker-compose.yml up -d --no-build

      - name: Wait for services to be ready
        run: |
          echo "⏳ Esperando a que los servicios estén listos..."
          echo ""
          echo "📦 Contenedores después de 30s:"
          sleep 30
          docker ps -a
          
          echo ""
          echo "⏳ Esperando más tiempo (otros 90s para que Airflow inicialice)..."
          sleep 90
          
          echo "✅ Servicios deberían estar iniciados"

      - name: Check cluster health
        run: |
          echo "🔍 Comprobando contenedores activos..."
          docker ps
          
          # Verificar API
          echo "📡 Probando API en localhost:8000..."
          curl --fail http://localhost:8000/health || exit 1
          echo "✅ API respondiendo correctamente"

      - name: Verify AEMET DAG execution
        env:
          PGPASSWORD: postgres
        run: |
          echo "🔧 Instalando dependencias..."
          sudo apt-get update && sudo apt-get install -y postgresql-client jq curl 2>&1 | tail -5
          
          echo ""
          echo "📍 === ESTADO DE CONTENEDORES ==="
          docker ps -a
          
          echo ""
          echo "🔍 Contenedores en ejecución:"
          docker ps --format "table {{.Names}}\t{{.Status}}\t{{.Ports}}"
          
          echo ""
          echo "📍 === VERIFICANDO BASE DE DATOS ==="
          ELAPSED=0
          MAX_WAIT=120
          while [ $ELAPSED -lt $MAX_WAIT ]; do
            # Intentar conexión vía docker exec (sin especificar DB, solo conectar a postgres)
            if docker exec docker-db-1 psql -U postgres -c "SELECT 1;" >/dev/null 2>&1; then
              echo "✅ PostgreSQL disponible"
              break
            fi
            echo "⏳ PostgreSQL no disponible (${ELAPSED}s), reintentando en 5s..."
            sleep 5
            ELAPSED=$((ELAPSED + 5))
          done
          
          if [ $ELAPSED -ge $MAX_WAIT ]; then
            echo "❌ PostgreSQL no está disponible después de 120s"
            echo ""
            echo "📋 LOGS DE POSTGRES:"
            docker logs docker-db-1 2>/dev/null | tail -30 || true
            exit 1
          fi
          
          echo ""
          echo "� === ESPERANDO A QUE LA TABLA 'alerts' SE CREE ==="
          ELAPSED=0
          MAX_WAIT_TABLES=180
          TABLE_FOUND=false
          
          while [ $ELAPSED -lt $MAX_WAIT_TABLES ]; do
            TABLE_EXISTS=$(docker exec docker-db-1 psql -U postgres -d alert_manager -t -c "SELECT EXISTS(SELECT 1 FROM information_schema.tables WHERE table_name='alerts');" 2>/dev/null || echo "false")
            TABLE_EXISTS=$(echo "$TABLE_EXISTS" | xargs)
            
            if [ "$TABLE_EXISTS" = "t" ]; then
              echo "✅ Tabla 'alerts' creada correctamente!"
              TABLE_FOUND=true
              break
            fi
            
            if [ $((ELAPSED % 30)) -eq 0 ]; then
              echo "⏳ Tabla 'alerts' aún no existe (${ELAPSED}s de ${MAX_WAIT_TABLES}s), reintentando..."
            fi
            
            sleep 5
            ELAPSED=$((ELAPSED + 5))
          done
          
          if [ "$TABLE_FOUND" != "true" ]; then
            echo "❌ Tabla 'alerts' no se creó después de ${MAX_WAIT_TABLES}s"
            echo ""
            echo "📊 Tablas existentes en alert_manager:"
            docker exec docker-db-1 psql -U postgres -d alert_manager -c "\dt" 2>/dev/null || true
            
            echo ""
            echo "📋 === LOGS DE LA APLICACIÓN FASTAPI ==="
            docker logs alert_manager-web-1 2>/dev/null | tail -50 || echo "No se pudo obtener logs"
            
            echo ""
            echo "📋 === LOGS DEL SCHEDULER DE AIRFLOW ==="
            docker logs alert_manager-airflow-scheduler-1 2>/dev/null | tail -30 || echo "No se pudo obtener logs"
            
            exit 1
          fi
          
          echo ""
          echo "📊 Esquema de la tabla 'alerts':"
          docker exec docker-db-1 psql -U postgres -d alert_manager -c "\d alerts" 2>/dev/null || true
          
          echo ""
          echo "📍 === VERIFICANDO ESTADO DEL DAG EN AIRFLOW ==="
          
          # Primero, verificar disponibilidad de Airflow API
          AIRFLOW_READY=false
          for i in {1..10}; do
            if curl -s http://localhost:8080/health/ready >/dev/null 2>&1; then
              echo "✅ Airflow API lista"
              AIRFLOW_READY=true
              break
            fi
            echo "⏳ Airflow no listo aún ($i/10)... esperando 10s"
            sleep 10
          done
          
          if [ "$AIRFLOW_READY" != "true" ]; then
            echo "⚠️  Airflow API no está lista, mostrando logs:"
            docker logs docker-airflow-webserver-1 2>/dev/null | tail -20 || true
            echo ""
            docker logs docker-airflow-scheduler-1 2>/dev/null | tail -20 || true
          fi
          
          # Intentar obtener info del DAG vía API de Airflow
          DAG_RESPONSE=$(curl -s "http://localhost:8080/api/v1/dags/aemet_alerts_ingestion" 2>/dev/null || echo "{}")
          
          if echo "$DAG_RESPONSE" | jq . >/dev/null 2>&1; then
            echo "✅ DAG 'aemet_alerts_ingestion' encontrado en Airflow"
            echo "$DAG_RESPONSE" | jq '{dag_id, is_paused, schedule_interval, last_parsed_time}' 2>/dev/null || true
            
            # Obtener últimas ejecuciones
            echo ""
            echo "🔄 Últimas ejecuciones del DAG:"
            RUNS=$(curl -s "http://localhost:8080/api/v1/dags/aemet_alerts_ingestion/dagRuns?limit=5&state=success&state=failed&state=running" 2>/dev/null || echo "{}")
            RUNS_COUNT=$(echo "$RUNS" | jq '.dag_runs | length' 2>/dev/null || echo "0")
            
            if [ "$RUNS_COUNT" -gt 0 ]; then
              echo "✅ Encontradas $RUNS_COUNT ejecuciones del DAG"
              echo "$RUNS" | jq '.dag_runs[] | {execution_date, state, start_date, end_date}' 2>/dev/null || true
            else
              echo "⏳ No hay ejecuciones del DAG aún. Esperando más tiempo (60s)..."
              sleep 60
              
              RUNS=$(curl -s "http://localhost:8080/api/v1/dags/aemet_alerts_ingestion/dagRuns?limit=5&state=success&state=failed&state=running" 2>/dev/null || echo "{}")
              RUNS_COUNT=$(echo "$RUNS" | jq '.dag_runs | length' 2>/dev/null || echo "0")
              echo "   Después de esperar 60s: $RUNS_COUNT ejecuciones encontradas"
              
              if [ "$RUNS_COUNT" -gt 0 ]; then
                echo "$RUNS" | jq '.dag_runs[] | {execution_date, state, start_date, end_date}' 2>/dev/null || true
              else
                echo "⚠️  Aún sin ejecuciones. Mostrando logs del scheduler:"
                docker logs docker-airflow-scheduler-1 2>/dev/null | tail -40 || true
              fi
            fi
            
            # Verificar logs del DAG en Airflow si existen ejecuciones
            if [ "$RUNS_COUNT" -gt 0 ]; then
              echo ""
              echo "📋 Logs del último run del DAG:"
              LAST_RUN_ID=$(echo "$RUNS" | jq -r '.dag_runs[0].dag_run_id' 2>/dev/null)
              if [ ! -z "$LAST_RUN_ID" ] && [ "$LAST_RUN_ID" != "null" ]; then
                LOGS=$(curl -s "http://localhost:8080/api/v1/dags/aemet_alerts_ingestion/dagRuns/$LAST_RUN_ID/taskInstances" 2>/dev/null || echo "{}")
                echo "$LOGS" | jq '.task_instances[] | {task_id, state, duration, try_number}' 2>/dev/null || true
              fi
            fi
          else
            echo "⚠️  No se pudo acceder a API de Airflow. DAG_RESPONSE: $DAG_RESPONSE"
            echo "   Esperando 30s más..."
            sleep 30
            
            DAG_RESPONSE=$(curl -s "http://localhost:8080/api/v1/dags/aemet_alerts_ingestion" 2>/dev/null || echo "{}")
            if echo "$DAG_RESPONSE" | jq . >/dev/null 2>&1; then
              echo "✅ Airflow ahora disponible"
              echo "$DAG_RESPONSE" | jq '{dag_id, is_paused, schedule_interval}' 2>/dev/null || true
            else
              echo "❌ Airflow aún no está respondiendo"
              echo ""
              echo "📋 LOGS DEL SCHEDULER:"
              docker logs docker-airflow-scheduler-1 2>/dev/null | tail -40 || true
            fi
          fi
          
          echo ""
          echo "📍 === VERIFICANDO ALERTAS EN BASE DE DATOS ==="
          
          echo "🧹 Limpiando alertas previas (estado inicial)..."
          docker exec docker-db-1 psql -U postgres -d alert_manager -c "DELETE FROM alerts;" 2>/dev/null || echo "⚠️ Tabla podría no existir aún"
          
          INITIAL_COUNT=$(docker exec docker-db-1 psql -U postgres -d alert_manager -t -c "SELECT COUNT(*) FROM alerts;" 2>/dev/null || echo "0")
          echo "✅ Alertas iniciales: $INITIAL_COUNT"
          
          echo ""
          echo "⏳ Esperando a que el DAG se ejecute (máximo 420 segundos = 7 minutos)..."
          
          ELAPSED=0
          MAX_WAIT=420
          INTERVAL=15
          
          while [ $ELAPSED -lt $MAX_WAIT ]; do
            CURRENT_COUNT=$(docker exec docker-db-1 psql -U postgres -d alert_manager -t -c "SELECT COUNT(*) FROM alerts;" 2>/dev/null || echo "0")
            
            if [ "$CURRENT_COUNT" -gt 0 ]; then
              echo "✅ ¡DAG ejecutado! Se encontraron $CURRENT_COUNT alertas después de ${ELAPSED}s"
              
              echo ""
              echo "📊 Detalles de alertas:"
              docker exec docker-db-1 psql -U postgres -d alert_manager -c "
                SELECT COUNT(*) as total, level, type FROM alerts GROUP BY level, type ORDER BY total DESC LIMIT 10;
              " 2>/dev/null || true
              
              echo ""
              echo "🔍 Últimas 3 alertas:"
              docker exec docker-db-1 psql -U postgres -d alert_manager -c "
                SELECT id, title, level, type, region, timestamp FROM alerts ORDER BY timestamp DESC LIMIT 3;
              " 2>/dev/null || true
              
              exit 0
            fi
            
            # Mostrar estado cada 30 segundos
            if [ $((ELAPSED % 30)) -eq 0 ]; then
              echo "   [$((ELAPSED/$INTERVAL))] Tiempo: ${ELAPSED}s | Alertas: $CURRENT_COUNT"
              
              # Mostrar estado del scheduler
              SCHEDULER_STATUS=$(docker ps --filter "name=airflow-scheduler" --format "{{.Status}}" 2>/dev/null || echo "N/A")
              echo "   📦 Scheduler: $SCHEDULER_STATUS"
            fi
            
            sleep $INTERVAL
            ELAPSED=$((ELAPSED + INTERVAL))
          done
          
          echo ""
          echo "⚠️ DAG no se ejecutó en el tiempo esperado (${MAX_WAIT}s)"
          echo ""
          echo "📋 Estados de contenedores:"
          docker ps --filter "name=alert_manager" --format "table {{.Names}}\t{{.Status}}" 2>/dev/null || true
          
          echo ""
          echo "💡 Si las alertas no se insertaron:"
          echo "   1. Revisa logs del scheduler: docker logs alert_manager-airflow-scheduler-1"
          echo "   2. Accede a Airflow UI: http://localhost:8080"
          echo "   3. Verifica si AEMET_API_KEY está configurada correctamente"

      - name: Stop cluster
        if: always()
        run: |
          cd docker && docker compose down -v
      
      - name: Show Microservice Logs on failure
        if: failure()
        run: |
          echo "📋 === LOGS DEL SCHEDULER ==="
          cd docker && docker compose logs airflow-scheduler | tail -50 || true
          
          echo ""
          echo "📋 === LOGS DE LA API ==="
          cd docker && docker compose logs airflow-webserver | tail -50 || true
          
          echo ""
          echo "📋 === LOGS DE POSTGRES ==="
          cd docker && docker compose logs postgres | tail -30 || true