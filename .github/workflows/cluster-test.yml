name: Cluster Integration Test

on:
  workflow_dispatch:      # Permite lanzarlo manualmente
  push:
    branches: ["main", "hito4"]
    paths:
      - 'src/**'
      - 'docker/**'
      - '.github/workflows/cluster-test.yml'

env:
  # Define aquí el nombre de tu imagen remota para verificarla luego
  REMOTE_IMAGE: ghcr.io/${{ github.repository }}

jobs:
  test-cluster:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      # 1. Nos logueamos para poder descargar la imagen de GHCR
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create .env from template
        run: |
          if [ -f .env.example ]; then cp .env.example .env; fi
          # Aseguramos variables críticas para el test
          echo "ENVIRONMENT=test" >> .env

      # 2. Descargamos explícitamente la imagen antes de levantar
      # Esto asegura que tenemos la versión de la nube, no una local
      - name: Pull remote images
        run: |
          docker compose -f docker/docker-compose.yml pull

      - name: Start cluster
        run: |
          docker compose -f docker/docker-compose.yml up -d

      # 3. PRUEBA DE FUEGO: Verificar que se está usando la imagen de GHCR
      # Inspeccionamos el contenedor 'web' para ver qué imagen está ejecutando realmente
      - name: 🕵️ Verify Image Source (GHCR Proof)
        run: |
          echo "🔍 Inspeccionando el contenedor 'alert_manager_web'..."
          
          # Obtenemos el nombre de la imagen usada por el contenedor
          USED_IMAGE=$(docker inspect --format='{{.Config.Image}}' alert_manager_web)
          
          echo "🖼️ Imagen en uso: $USED_IMAGE"
          
          # Comprobamos si contiene ghcr.io
          if [[ "$USED_IMAGE" == *"ghcr.io"* ]]; then
            echo "✅ ÉXITO: El contenedor está usando la imagen del registro de GitHub."
          else
            echo "❌ ERROR: El contenedor está usando una imagen local o incorrecta: $USED_IMAGE"
            echo "⚠️ Asegúrate de que en docker-compose.yml la línea 'image:' apunta a ghcr.io"
            exit 1
          fi

      # 4. Lógica de espera paciente
      - name: Run Patient Health Checks
        run: |
          # Función de espera con reintentos
          wait_for_url() {
              url=$1
              service_name=$2
              max_retries=40 # 40 * 5s = ~3 minutos de espera máx
              count=0
              
              echo "⏳ Esperando a $service_name ($url)..."
              
              until curl -s -f "$url" > /dev/null; do
                  ((count++))
                  if [ $count -ge $max_retries ]; then
                      echo "❌ Timeout: $service_name no respondió tras $max_retries intentos."
                      return 1
                  fi
                  printf '.'
                  sleep 5
              done
              echo " ✅ $service_name está LISTO."
          }

          # Esperar al API (Web)
          wait_for_url "http://localhost:8000/health" "API Web" || exit 1
          
          # Esperar a Airflow (Suele tardar más)
          wait_for_url "http://localhost:8080/health" "Airflow Webserver" || exit 1
          
          # Si tienes frontend en puerto 3000, descomenta la siguiente línea:
          # wait_for_url "http://localhost:3000" "Frontend" || exit 1

          echo "🎉 ¡Todos los servicios del clúster están operativos!"

      - name: Show Logs on Failure
        if: failure()
        run: |
          echo "📜 Mostrando logs de los últimos momentos..."
          docker compose -f docker/docker-compose.yml logs --tail=100

      - name: Stop cluster
        if: always()
        run: |
          docker compose -f docker/docker-compose.yml down -v