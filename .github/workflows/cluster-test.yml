name: Cluster Test

on:
  workflow_dispatch:
  push:
    branches: ["main", "hito5"]
  pull_request:
    branches: ["main", "hito5"]

jobs:
  test-cluster:
    runs-on: ubuntu-latest
    # 👇 Permisos necesarios para leer el token
    permissions:
      contents: read
      packages: read

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      # 👇 ESTE ES EL PASO QUE FALTABA (Login)
      # Sin esto, Docker intenta entrar como "anónimo" y falla
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Create .env from template if exists
        run: |
          if [ -f .env.example ]; then cp .env.example .env; fi

      # Ahora el debug sí funcionará porque estás logueado
      - name: Debug - Force Pull Image
        run: |
          echo "Intentando descargar explícitamente..."
          docker pull ghcr.io/davidmunozsanchez/alert_manager:latest
          echo "✅ Imagen descargada correctamente"
          docker images

      - name: Start cluster
        env:
          AEMET_API_KEY: ${{ secrets.AEMET_API_KEY }}
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          DB_NAME: alert_manager
        run: |
          # --no-build fuerza a usar la imagen descargada
          cd docker && docker compose -f docker-compose.yml up -d --no-build

      - name: Wait for services to be ready
        run: |
          echo "⏳ Esperando a que los servicios estén listos..."
          echo ""
          echo "📦 Contenedores después de 30s:"
          sleep 30
          docker ps -a
          
          echo ""
          echo "⏳ Esperando más tiempo (otros 30s)..."
          sleep 30
          
          echo "✅ Servicios deberían estar iniciados"

      - name: Check cluster health
        run: |
          echo "🔍 Comprobando contenedores activos..."
          docker ps
          
          # Verificar API
          echo "📡 Probando API en localhost:8000..."
          curl --fail http://localhost:8000/health || exit 1
          echo "✅ API respondiendo correctamente"

      - name: Verify AEMET DAG execution
        env:
          PGPASSWORD: postgres
        run: |
          echo "🔧 Instalando dependencias..."
          sudo apt-get update && sudo apt-get install -y postgresql-client jq curl 2>&1 | tail -5
          
          echo ""
          echo "📍 === ESTADO DE CONTENEDORES ==="
          docker ps -a
          
          echo ""
          echo "📍 === VERIFICANDO BASE DE DATOS ==="
          ELAPSED=0
          MAX_WAIT=120
          while [ $ELAPSED -lt $MAX_WAIT ]; do
            if psql -h localhost -p 5432 -U postgres -d alert_manager -c "SELECT 1;" 2>/dev/null; then
              echo "✅ PostgreSQL disponible"
              break
            fi
            echo "⏳ PostgreSQL no disponible (${ELAPSED}s), reintentando en 5s..."
            sleep 5
            ELAPSED=$((ELAPSED + 5))
          done
          
          if [ $ELAPSED -ge $MAX_WAIT ]; then
            echo "❌ PostgreSQL no está disponible después de 120s"
            echo ""
            echo "📋 LOGS DE POSTGRES:"
            docker logs alert_manager-postgres-1 2>/dev/null | tail -30 || true
            exit 1
          fi
          
          echo ""
          echo "📍 === VERIFICANDO ESTADO DEL DAG EN AIRFLOW ==="
          
          # Intentar obtener info del DAG vía API de Airflow
          DAG_RESPONSE=$(curl -s "http://localhost:8080/api/v1/dags/aemet_alerts_ingestion" 2>/dev/null || echo "{}")
          
          if echo "$DAG_RESPONSE" | jq . >/dev/null 2>&1; then
            echo "✅ DAG encontrado en Airflow"
            echo "$DAG_RESPONSE" | jq '{dag_id, is_paused, schedule_interval, last_parsed_time}' 2>/dev/null || true
            
            # Obtener últimas ejecuciones
            echo ""
            echo "🔄 Últimas ejecuciones del DAG:"
            RUNS=$(curl -s "http://localhost:8080/api/v1/dags/aemet_alerts_ingestion/dagRuns?limit=3" 2>/dev/null || echo "{}")
            echo "$RUNS" | jq '.dag_runs[] | {execution_date, state, start_date, end_date}' 2>/dev/null || true
          else
            echo "⚠️  No se pudo acceder a API de Airflow (es normal si aún está inicializando)"
          fi
          
          echo ""
          echo "📍 === VERIFICANDO ALERTAS EN BASE DE DATOS ==="
          
          echo "🧹 Limpiando alertas previas (estado inicial)..."
          psql -h localhost -p 5432 -U postgres -d alert_manager -c "DELETE FROM alerts;" 2>/dev/null || echo "⚠️ Tabla podría no existir aún"
          
          INITIAL_COUNT=$(psql -h localhost -p 5432 -U postgres -d alert_manager -t -c "SELECT COUNT(*) FROM alerts;" 2>/dev/null || echo "0")
          echo "✅ Alertas iniciales: $INITIAL_COUNT"
          
          echo ""
          echo "⏳ Esperando a que el DAG se ejecute (máximo 320 segundos)..."
          
          ELAPSED=0
          MAX_WAIT=320
          INTERVAL=10
          
          while [ $ELAPSED -lt $MAX_WAIT ]; do
            CURRENT_COUNT=$(psql -h localhost -p 5432 -U postgres -d alert_manager -t -c "SELECT COUNT(*) FROM alerts;" 2>/dev/null || echo "0")
            
            if [ "$CURRENT_COUNT" -gt 0 ]; then
              echo "✅ ¡DAG ejecutado! Se encontraron $CURRENT_COUNT alertas después de ${ELAPSED}s"
              
              echo ""
              echo "📊 Detalles de alertas:"
              psql -h localhost -p 5432 -U postgres -d alert_manager -c "
                SELECT COUNT(*) as total, level, type FROM alerts GROUP BY level, type ORDER BY total DESC LIMIT 10;
              " 2>/dev/null || true
              
              echo ""
              echo "🔍 Últimas 3 alertas:"
              psql -h localhost -p 5432 -U postgres -d alert_manager -c "
                SELECT id, title, level, type, region, timestamp FROM alerts ORDER BY timestamp DESC LIMIT 3;
              " 2>/dev/null || true
              
              exit 0
            fi
            
            # Mostrar estado cada 30 segundos
            if [ $((ELAPSED % 30)) -eq 0 ]; then
              echo "   [$((ELAPSED/$INTERVAL))] Tiempo: ${ELAPSED}s | Alertas: $CURRENT_COUNT"
              
              # Mostrar estado del scheduler
              SCHEDULER_STATUS=$(docker ps --filter "name=airflow-scheduler" --format "{{.Status}}" 2>/dev/null || echo "N/A")
              echo "   📦 Scheduler: $SCHEDULER_STATUS"
            fi
            
            sleep $INTERVAL
            ELAPSED=$((ELAPSED + INTERVAL))
          done
          
          echo ""
          echo "⚠️ DAG no se ejecutó en el tiempo esperado (${MAX_WAIT}s)"
          echo ""
          echo "📋 Estados de contenedores:"
          docker ps --filter "name=alert_manager" --format "table {{.Names}}\t{{.Status}}" 2>/dev/null || true
          
          echo ""
          echo "💡 Si las alertas no se insertaron:"
          echo "   1. Revisa logs del scheduler: docker logs alert_manager-airflow-scheduler-1"
          echo "   2. Accede a Airflow UI: http://localhost:8080"
          echo "   3. Verifica si AEMET_API_KEY está configurada correctamente"

      - name: Stop cluster
        if: always()
        run: |
          cd docker && docker compose down -v
      
      - name: Show Microservice Logs on failure
        if: failure()
        run: |
          echo "📋 === LOGS DEL SCHEDULER ==="
          cd docker && docker compose logs airflow-scheduler | tail -50 || true
          
          echo ""
          echo "📋 === LOGS DE LA API ==="
          cd docker && docker compose logs airflow-webserver | tail -50 || true
          
          echo ""
          echo "📋 === LOGS DE POSTGRES ==="
          cd docker && docker compose logs postgres | tail -30 || true