# ⚠️ IMPORTANTE: Este archivo es solo un template
# En producción, los secrets se crean via GitHub Actions o kubectl
# NO commitear este archivo con valores reales
#
# Los secrets reales se configuran en GitHub Secrets:
# - POSTGRES_PASSWORD
# - AEMET_API_KEY
# - AIRFLOW_FERNET_KEY

apiVersion: v1
kind: Secret
metadata:
  name: alert-manager-secrets
  namespace: alert-manager
type: Opaque
stringData:
  # Estos valores serán reemplazados por GitHub Actions
  POSTGRES_PASSWORD: "PLACEHOLDER_DO_NOT_USE"
  AEMET_API_KEY: "PLACEHOLDER_DO_NOT_USE"
  AIRFLOW__CORE__FERNET_KEY: "PLACEHOLDER_DO_NOT_USE"
