apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: alert-manager-ingress
  namespace: alert-manager
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "60"
    # Descomentar para HTTPS con cert-manager
    # cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  # Descomentar para HTTPS
  # tls:
  #   - hosts:
  #       - alert-manager.tu-dominio.com
  #     secretName: alert-manager-tls
  rules:
    - http:
        paths:
          # API Principal
          - path: /
            pathType: Prefix
            backend:
              service:
                name: alert-manager-api
                port:
                  number: 80
          # Airflow UI (opcional, si quieres exponerlo)
          - path: /airflow
            pathType: Prefix
            backend:
              service:
                name: airflow-webserver
                port:
                  number: 8080
