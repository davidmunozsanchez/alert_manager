apiVersion: apps/v1
kind: Deployment
metadata:
  name: alert-manager-api
  namespace: alert-manager
  labels:
    app: alert-manager-api
    component: api
spec:
  replicas: 2  # Alta disponibilidad
  selector:
    matchLabels:
      app: alert-manager-api
  template:
    metadata:
      labels:
        app: alert-manager-api
        component: api
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
        prometheus.io/path: "/metrics"
    spec:
      initContainers:
        # Esperar a que PostgreSQL esté listo
        - name: wait-for-postgres
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              echo "Esperando a PostgreSQL..."
              until nc -z postgres 5432; do
                echo "PostgreSQL no disponible, reintentando en 2s..."
                sleep 2
              done
              echo "PostgreSQL disponible!"
      containers:
        - name: api
          image: ghcr.io/davidmunozsanchez/alert_manager:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
              name: http
          env:
            - name: POSTGRES_USER
              valueFrom:
                configMapKeyRef:
                  name: alert-manager-config
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: alert-manager-secrets
                  key: POSTGRES_PASSWORD
            - name: POSTGRES_DB
              valueFrom:
                configMapKeyRef:
                  name: alert-manager-config
                  key: POSTGRES_DB
            - name: POSTGRES_HOST
              valueFrom:
                configMapKeyRef:
                  name: alert-manager-config
                  key: POSTGRES_HOST
            - name: POSTGRES_PORT
              valueFrom:
                configMapKeyRef:
                  name: alert-manager-config
                  key: POSTGRES_PORT
            - name: DATABASE_URL
              value: "postgresql://$(POSTGRES_USER):$(POSTGRES_PASSWORD)@$(POSTGRES_HOST):$(POSTGRES_PORT)/$(POSTGRES_DB)"
            - name: SEQ_URL
              valueFrom:
                configMapKeyRef:
                  name: alert-manager-config
                  key: SEQ_URL
            - name: LOG_LEVEL
              valueFrom:
                configMapKeyRef:
                  name: alert-manager-config
                  key: LOG_LEVEL
            - name: PYTHONPATH
              valueFrom:
                configMapKeyRef:
                  name: alert-manager-config
                  key: PYTHONPATH
            - name: ENVIRONMENT
              valueFrom:
                configMapKeyRef:
                  name: alert-manager-config
                  key: ENVIRONMENT
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
      imagePullSecrets:
        - name: ghcr-secret
