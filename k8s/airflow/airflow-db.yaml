# Airflow Database (PostgreSQL separado)
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: airflow-db-pvc
  namespace: alert-manager
  labels:
    app: airflow-db
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 2Gi
  storageClassName: oci-bv
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: airflow-db
  namespace: alert-manager
  labels:
    app: airflow-db
    component: airflow
spec:
  replicas: 1
  selector:
    matchLabels:
      app: airflow-db
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: airflow-db
        component: airflow
    spec:
      containers:
        - name: postgres
          image: docker.io/library/postgres:15
          ports:
            - containerPort: 5432
              name: postgres
          env:
            - name: POSTGRES_USER
              valueFrom:
                configMapKeyRef:
                  name: alert-manager-config
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: alert-manager-secrets
                  key: POSTGRES_PASSWORD
            - name: POSTGRES_DB
              valueFrom:
                configMapKeyRef:
                  name: alert-manager-config
                  key: AIRFLOW_DB_NAME
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          volumeMounts:
            - name: airflow-db-storage
              mountPath: /var/lib/postgresql/data
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "250m"
          livenessProbe:
            exec:
              command:
                - sh
                - -c
                - pg_isready -U $POSTGRES_USER
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            exec:
              command:
                - sh
                - -c
                - pg_isready -U $POSTGRES_USER
            initialDelaySeconds: 5
            periodSeconds: 5
      volumes:
        - name: airflow-db-storage
          persistentVolumeClaim:
            claimName: airflow-db-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: airflow-db
  namespace: alert-manager
  labels:
    app: airflow-db
spec:
  type: ClusterIP
  ports:
    - port: 5432
      targetPort: 5432
      name: postgres
  selector:
    app: airflow-db
